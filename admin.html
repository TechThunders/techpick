<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechPick — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── ADMIN-SPECIFIC STYLES ── */
    body { background: var(--bg); }

    .admin-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* LOGIN SCREEN */
    #login-screen {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      text-align: center;
    }
    #login-screen .logo { font-size: 1.8rem; margin-bottom: 0.3rem; display: block; }
    #login-screen p { color: var(--muted); font-size: 0.85rem; margin-bottom: 2rem; }
    #login-screen input {
      width: 100%; padding: 0.85rem 1rem;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: inherit; font-size: 1rem;
      margin-bottom: 1rem; box-sizing: border-box;
      transition: border-color 0.2s;
    }
    #login-screen input:focus { outline: none; border-color: var(--accent); }
    #login-error { color: #ff6b6b; font-size: 0.82rem; margin-top: -0.5rem; margin-bottom: 0.8rem; display: none; }

    /* ADMIN PANEL */
    #admin-panel { display: none; width: 100%; max-width: 760px; }

    .admin-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2rem;
    }
    .admin-header .logo { font-size: 1.6rem; }
    .admin-header .badge {
      background: var(--accent); color: #000;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em;
      padding: 0.3rem 0.7rem; border-radius: 20px; font-family: 'Syne', sans-serif;
    }
    .logout-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); padding: 0.4rem 1rem;
      border-radius: 8px; cursor: pointer; font-family: inherit;
      font-size: 0.82rem; transition: all 0.2s;
    }
    .logout-btn:hover { border-color: #ff6b6b; color: #ff6b6b; }

    .admin-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 2rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      margin-bottom: 1.5rem;
    }
    .admin-card h2 {
      font-family: 'Syne', sans-serif; font-size: 1.1rem;
      font-weight: 700; margin-bottom: 1.5rem;
      color: var(--text); display: flex; align-items: center; gap: 0.5rem;
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .form-row.single { grid-template-columns: 1fr; }
    @media(max-width: 560px) { .form-row { grid-template-columns: 1fr; } }

    .field { display: flex; flex-direction: column; gap: 0.4rem; }
    .field label {
      font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em;
      text-transform: uppercase; color: var(--muted);
    }
    .field input, .field select, .field textarea {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: inherit; font-size: 0.92rem;
      padding: 0.75rem 0.9rem; transition: border-color 0.2s;
      box-sizing: border-box; width: 100%;
    }
    .field textarea { resize: vertical; min-height: 90px; }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none; border-color: var(--accent);
    }
    .field select option { background: #1a1a2e; }

    .tag-row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.3rem; }
    .tag {
      background: rgba(var(--accent-rgb), 0.15); border: 1px solid rgba(var(--accent-rgb), 0.3);
      color: var(--accent); border-radius: 20px;
      padding: 0.25rem 0.75rem; font-size: 0.78rem;
      cursor: pointer; transition: all 0.2s; user-select: none;
    }
    .tag.selected { background: var(--accent); color: #000; }

    .submit-row { display: flex; gap: 1rem; margin-top: 1.5rem; align-items: center; }
    .btn-primary {
      background: var(--accent); color: #000;
      border: none; border-radius: 10px;
      padding: 0.85rem 2rem; font-family: 'Syne', sans-serif;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
      transition: all 0.2s; flex-shrink: 0;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(var(--accent-rgb),0.4); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-clear {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 10px; padding: 0.85rem 1.5rem;
      font-family: inherit; font-size: 0.9rem; cursor: pointer; transition: all 0.2s;
    }
    .btn-clear:hover { border-color: var(--text); color: var(--text); }

    #form-status {
      font-size: 0.85rem; padding: 0.5rem 0;
      transition: all 0.3s;
    }
    #form-status.success { color: #4ade80; }
    #form-status.error { color: #ff6b6b; }

    /* RECENT POSTS TABLE */
    .posts-table { width: 100%; border-collapse: collapse; }
    .posts-table th {
      text-align: left; font-size: 0.72rem; letter-spacing: 0.05em;
      text-transform: uppercase; color: var(--muted);
      padding: 0 0.75rem 0.75rem; border-bottom: 1px solid var(--border);
    }
    .posts-table td {
      padding: 0.9rem 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 0.875rem; vertical-align: middle;
    }
    .posts-table tr:last-child td { border-bottom: none; }
    .posts-table tr:hover td { background: rgba(255,255,255,0.02); }
    .type-badge {
      display: inline-block; font-size: 0.7rem; font-weight: 700;
      padding: 0.2rem 0.6rem; border-radius: 20px; letter-spacing: 0.04em;
    }
    .type-badge.deal { background: rgba(255,160,50,0.15); color: #ffa032; }
    .type-badge.comparison { background: rgba(100,200,255,0.15); color: #64c8ff; }
    .del-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; padding: 0.3rem; border-radius: 6px;
      transition: color 0.2s; font-size: 1rem;
    }
    .del-btn:hover { color: #ff6b6b; }

    .no-posts-row td { text-align: center; color: var(--muted); padding: 2rem; }

    /* PREVIEW TOGGLE */
    .preview-toggle {
      font-size: 0.78rem; color: var(--accent); cursor: pointer;
      text-decoration: underline; margin-top: 0.5rem; display: inline-block;
    }
    #preview-box {
      display: none; margin-top: 1rem;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem;
    }
  </style>
</head>
<body>
<div class="noise"></div>
<div class="admin-wrap">

  <!-- LOGIN -->
  <div id="login-screen">
    <a class="logo">Tech<span>Pick</span></a>
    <p>Admin access only</p>
    <input type="password" id="pwd-input" placeholder="Enter password" autocomplete="current-password" />
    <div id="login-error">Wrong password. Try again.</div>
    <button class="btn-primary" style="width:100%" onclick="tryLogin()">Enter →</button>
  </div>

  <!-- ADMIN PANEL -->
  <div id="admin-panel">

    <div class="admin-header">
      <div style="display:flex;align-items:center;gap:1rem">
        <a href="index.html" class="logo">Tech<span>Pick</span></a>
        <span class="badge">ADMIN</span>
      </div>
      <div style="display:flex;gap:0.75rem;align-items:center">
        <a href="index.html" target="_blank" style="font-size:0.82rem;color:var(--muted);text-decoration:none;">View Site ↗</a>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- POST FORM -->
    <div class="admin-card">
      <h2>✏️ New Post</h2>

      <div class="form-row">
        <div class="field">
          <label>Post Type</label>
          <select id="post-type">
            <option value="deal">🔥 Deal</option>
            <option value="comparison">⚖️ Comparison</option>
          </select>
        </div>
        <div class="field">
          <label>Product / Title</label>
          <input type="text" id="post-title" placeholder="e.g. Redmi Note 14 Pro" />
        </div>
      </div>

      <div class="form-row single">
        <div class="field">
          <label>Short Description</label>
          <textarea id="post-desc" placeholder="2–3 lines: what's good, what's not, who it's for…"></textarea>
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>Amazon Affiliate Link (paid link)</label>
          <input type="url" id="post-link" placeholder="https://amzn.to/..." />
        </div>
        <div class="field">
          <label>Image URL (optional)</label>
          <input type="url" id="post-img" placeholder="https://..." />
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>Price / Deal Info</label>
          <input type="text" id="post-price" placeholder="e.g. ₹14,999 (was ₹18,999)" />
        </div>
        <div class="field">
          <label>Tags</label>
          <div class="tag-row" id="tag-row">
            <span class="tag" data-tag="budget">Budget</span>
            <span class="tag" data-tag="flagship">Flagship</span>
            <span class="tag" data-tag="audio">Audio</span>
            <span class="tag" data-tag="laptop">Laptop</span>
            <span class="tag" data-tag="phone">Phone</span>
            <span class="tag" data-tag="accessories">Accessories</span>
            <span class="tag" data-tag="tv">TV</span>
            <span class="tag" data-tag="gaming">Gaming</span>
          </div>
        </div>
      </div>

      <span class="preview-toggle" onclick="togglePreview()">Preview card →</span>
      <div id="preview-box">
        <div id="preview-card"></div>
      </div>

      <div class="submit-row">
        <button class="btn-primary" id="submit-btn" onclick="submitPost()">Publish Post</button>
        <button class="btn-clear" onclick="clearForm()">Clear</button>
        <span id="form-status"></span>
      </div>
    </div>

    <!-- RECENT POSTS -->
    <div class="admin-card">
      <h2>📋 Recent Posts</h2>
      <table class="posts-table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Type</th>
            <th>Price</th>
            <th>Date</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="posts-table-body">
          <tr class="no-posts-row"><td colspan="5">Loading…</td></tr>
        </tbody>
      </table>
    </div>

  </div><!-- /admin-panel -->
</div>

<script src="app.js"></script>
<script>
  const ADMIN_PASSWORD = 'TPASP#2026'; // ← Change this!

  // ── LOGIN ──
  function tryLogin() {
    const val = document.getElementById('pwd-input').value;
    if (val === ADMIN_PASSWORD) {
      sessionStorage.setItem('tp_auth', '1');
      showPanel();
    } else {
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('pwd-input').value = '';
    }
  }
  document.getElementById('pwd-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryLogin();
  });

  function logout() {
    sessionStorage.removeItem('tp_auth');
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('login-screen').style.display = 'block';
  }

  function showPanel() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    loadAdminTable();
  }

  if (sessionStorage.getItem('tp_auth') === '1') showPanel();

  // ── TAGS ──
  document.querySelectorAll('.tag').forEach(tag => {
    tag.addEventListener('click', () => tag.classList.toggle('selected'));
  });

  function getSelectedTags() {
    return [...document.querySelectorAll('.tag.selected')].map(t => t.dataset.tag).join(', ');
  }

  // ── SUBMIT ──
  async function submitPost() {
    const title = document.getElementById('post-title').value.trim();
    const desc  = document.getElementById('post-desc').value.trim();
    const link  = document.getElementById('post-link').value.trim();
    const type  = document.getElementById('post-type').value;
    const price = document.getElementById('post-price').value.trim();
    const img   = document.getElementById('post-img').value.trim();
    const tags  = getSelectedTags();

    if (!title || !desc || !link) {
      setStatus('Please fill in Title, Description and Link.', 'error');
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Publishing…';
    setStatus('', '');

    const row = [
      new Date().toLocaleDateString('en-IN'),
      type, title, desc, price, link, img, tags
    ];

    const ok = await appendToSheet(row);
    btn.disabled = false;
    btn.textContent = 'Publish Post';

    if (ok) {
      setStatus('✓ Post published!', 'success');
      clearForm();
      loadAdminTable();
    } else {
      setStatus('⚠ Error — check your Google Sheet setup in app.js', 'error');
    }
  }

  function setStatus(msg, type) {
    const el = document.getElementById('form-status');
    el.textContent = msg;
    el.className = type;
  }

  function clearForm() {
    ['post-title','post-desc','post-link','post-img','post-price'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.querySelectorAll('.tag').forEach(t => t.classList.remove('selected'));
    document.getElementById('post-type').value = 'deal';
    document.getElementById('preview-box').style.display = 'none';
  }

  // ── PREVIEW ──
  function togglePreview() {
    const box = document.getElementById('preview-box');
    const visible = box.style.display === 'block';
    if (!visible) {
      const title = document.getElementById('post-title').value || 'Post Title';
      const desc  = document.getElementById('post-desc').value || 'Description goes here.';
      const price = document.getElementById('post-price').value || '';
      const link  = document.getElementById('post-link').value || '#';
      const img   = document.getElementById('post-img').value || '';
      const type  = document.getElementById('post-type').value;
      document.getElementById('preview-card').innerHTML = buildCard({date:'Today', type, title, desc, price, link, img, tags:''}, true);
    }
    box.style.display = visible ? 'none' : 'block';
  }

  // ── ADMIN TABLE ──
  async function loadAdminTable() {
    const tbody = document.getElementById('posts-table-body');
    tbody.innerHTML = '<tr class="no-posts-row"><td colspan="5">Loading…</td></tr>';
    const posts = await fetchPosts();
    if (!posts || posts.length === 0) {
      tbody.innerHTML = '<tr class="no-posts-row"><td colspan="5">No posts yet.</td></tr>';
      return;
    }
    tbody.innerHTML = posts.slice().reverse().map((p, i) => `
      <tr>
        <td>${p.title}</td>
        <td><span class="type-badge ${p.type}">${p.type === 'deal' ? '🔥 Deal' : '⚖️ Compare'}</span></td>
        <td style="color:var(--accent)">${p.price || '—'}</td>
        <td style="color:var(--muted);font-size:0.8rem">${p.date}</td>
        <td><button class="del-btn" title="Delete" onclick="deletePost(${posts.length - 1 - i})">🗑</button></td>
      </tr>
    `).join('');
  }

  async function deletePost(rowIndex) {
    if (!confirm('Delete this post?')) return;
    const ok = await deleteSheetRow(rowIndex);
    if (ok) loadAdminTable();
    else alert('Delete failed — check your Sheet setup.');
  }
</script>
</body>
</html>
